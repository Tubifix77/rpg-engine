<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RPG Engine — Millhaven</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',sans-serif; background:#0a0a0f; color:#c8c8d4; height:100vh; display:flex; flex-direction:column; }
#top-bar { background:#12121a; border-bottom:1px solid #2a2a3a; padding:8px 16px; display:flex; align-items:center; gap:16px; }
#top-bar h1 { font-size:16px; color:#d4a56a; font-weight:600; }
#top-bar .clock { color:#8888aa; font-size:13px; margin-left:auto; }
#top-bar .player-hp { color:#c44; font-size:13px; font-weight:600; }
#main { display:flex; flex:1; overflow:hidden; }

/* Left panel - Character */
#left-panel { width:260px; background:#0e0e16; border-right:1px solid #2a2a3a; overflow-y:auto; padding:12px; flex-shrink:0; }
.panel-title { color:#d4a56a; font-size:13px; font-weight:600; text-transform:uppercase; letter-spacing:1px; margin:12px 0 6px; border-bottom:1px solid #2a2a3a; padding-bottom:4px; }
.stat-row { display:flex; justify-content:space-between; padding:3px 0; font-size:13px; }
.stat-label { color:#8888aa; }
.stat-val { color:#e0e0e8; font-weight:600; }
.hp-bar { height:8px; background:#1a1a2a; border-radius:4px; margin:4px 0 8px; overflow:hidden; }
.hp-fill { height:100%; background:linear-gradient(90deg,#c44,#d4a56a); border-radius:4px; transition:width 0.5s; }
.inv-item { font-size:12px; color:#aaa; padding:2px 0; }
.inv-item .equipped { color:#d4a56a; }
.knowledge-item { font-size:11px; color:#7a7a9a; padding:2px 0; font-style:italic; }
.cond-badge { display:inline-block; background:#442; color:#da6; font-size:11px; padding:1px 6px; border-radius:3px; margin:2px 2px; }

/* Center - Narrative */
#center { flex:1; display:flex; flex-direction:column; }
#narrative-area { flex:1; overflow-y:auto; padding:16px 24px; }
.turn { margin-bottom:20px; border-bottom:1px solid #1a1a2a; padding-bottom:16px; }
.turn-action { color:#d4a56a; font-weight:600; font-size:14px; margin-bottom:8px; }
.turn-action::before { content:'> '; color:#666; }
.turn-narrative { color:#c8c8d4; line-height:1.7; font-size:14px; white-space:pre-wrap; }
.turn-mechanics { margin-top:8px; padding:6px 10px; background:#12121a; border-left:3px solid #d4a56a; font-family:'Consolas',monospace; font-size:12px; }
.mech-hit { color:#5a5; }
.mech-miss { color:#a55; }
.mech-counter { color:#a85; }
.mech-disp { color:#88a; }
.mech-violation { color:#a44; }
.mech-plaus { color:#8a8; }
.mech-impossible { color:#a44; font-weight:600; }
.turn-loading { color:#666; font-style:italic; }
.swipe-btn { background:none; border:1px solid #2a2a3a; color:#888; padding:2px 8px; font-size:11px; cursor:pointer; margin-top:4px; border-radius:3px; }
.swipe-btn:hover { border-color:#d4a56a; color:#d4a56a; }

/* Input */
#input-area { padding:12px 24px; border-top:1px solid #2a2a3a; background:#0e0e16; display:flex; gap:8px; }
#action-input { flex:1; background:#1a1a2a; border:1px solid #2a2a3a; color:#e0e0e8; padding:10px 14px; font-size:14px; border-radius:6px; outline:none; font-family:inherit; }
#action-input:focus { border-color:#d4a56a; }
#action-input:disabled { opacity:0.5; }
#send-btn { background:#d4a56a; color:#0a0a0f; border:none; padding:10px 20px; font-size:14px; font-weight:600; border-radius:6px; cursor:pointer; }
#send-btn:hover { background:#e0b87a; }
#send-btn:disabled { opacity:0.5; cursor:default; }

/* Right panel - NPCs */
#right-panel { width:280px; background:#0e0e16; border-left:1px solid #2a2a3a; overflow-y:auto; padding:12px; flex-shrink:0; }
.npc-card { background:#12121a; border:1px solid #2a2a3a; border-radius:6px; padding:10px; margin-bottom:8px; }
.npc-name { color:#d4a56a; font-weight:600; font-size:14px; }
.npc-mood { font-size:11px; padding:1px 6px; border-radius:3px; margin-left:6px; }
.mood-hostile { background:#422; color:#f66; }
.mood-wary { background:#432; color:#fa6; }
.mood-neutral { background:#333; color:#aaa; }
.mood-friendly { background:#243; color:#6d6; }
.npc-hp-bar { height:5px; background:#1a1a2a; border-radius:3px; margin:4px 0; overflow:hidden; }
.npc-hp-fill { height:100%; background:#5a5; border-radius:3px; transition:width 0.5s; }
.npc-detail { font-size:11px; color:#7a7a9a; padding:2px 0; }
.npc-goal { font-size:11px; color:#88a; padding:1px 0; }
.npc-goal::before { content:'⚑ '; }
.npc-knows { font-size:11px; color:#a86; padding:1px 0; font-style:italic; }
.npc-knows::before { content:'◉ '; }
.npc-notes { font-size:11px; color:#666; padding:2px 0; }
.npc-dead { opacity:0.4; }

/* Location */
.loc-name { color:#d4a56a; font-size:15px; font-weight:600; }
.loc-desc { color:#8888aa; font-size:12px; margin:2px 0; }
.loc-state { color:#a86; font-size:11px; font-style:italic; }
.loc-exits { font-size:12px; color:#666; margin-top:4px; }
.loc-exit { display:inline-block; background:#1a1a2a; border:1px solid #2a2a3a; padding:2px 8px; border-radius:3px; margin:2px; font-size:11px; color:#aaa; cursor:pointer; }
.loc-exit:hover { border-color:#d4a56a; color:#d4a56a; }
</style>
</head>
<body>
<div id="top-bar">
    <h1>⚔ RPG Engine</h1>
    <span id="loc-display" class="loc-name"></span>
    <span class="clock" id="clock-display"></span>
    <span class="player-hp" id="hp-display"></span>
</div>
<div id="main">
    <div id="left-panel">
        <div class="panel-title">Character</div>
        <div id="char-info"></div>
        <div class="panel-title">Inventory</div>
        <div id="char-inv"></div>
        <div class="panel-title">Known Facts</div>
        <div id="char-knowledge"></div>
    </div>
    <div id="center">
        <div id="narrative-area"></div>
        <div id="input-area">
            <input type="text" id="action-input" placeholder="What do you do?" autofocus>
            <button id="send-btn" onclick="sendAction()">⚔</button>
        </div>
    </div>
    <div id="right-panel">
        <div class="panel-title">Location</div>
        <div id="loc-info"></div>
        <div class="panel-title">NPCs Present</div>
        <div id="npc-list"></div>
    </div>
</div>
<script>
const narArea = document.getElementById('narrative-area');
const inp = document.getElementById('action-input');
const sendBtn = document.getElementById('send-btn');
let busy = false;

inp.addEventListener('keydown', e => { if (e.key === 'Enter' && !busy) sendAction(); });

async function sendAction() {
    const act = inp.value.trim();
    if (!act || busy) return;
    busy = true;
    inp.disabled = true;
    sendBtn.disabled = true;
    inp.value = '';
    // Show loading
    const turnDiv = document.createElement('div');
    turnDiv.className = 'turn';
    turnDiv.innerHTML = `<div class="turn-action">${esc(act)}</div><div class="turn-loading">Resolving...</div>`;
    narArea.appendChild(turnDiv);
    narArea.scrollTop = narArea.scrollHeight;
    try {
        const res = await fetch('/api/action', {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({action: act})
        });
        const data = await res.json();
        renderTurn(turnDiv, data);
        refreshState();
    } catch(e) {
        turnDiv.querySelector('.turn-loading').textContent = 'Error: ' + e.message;
    }
    busy = false;
    inp.disabled = false;
    sendBtn.disabled = false;
    inp.focus();
    narArea.scrollTop = narArea.scrollHeight;
}

function renderTurn(div, data) {
    let html = `<div class="turn-action">${esc(data.action)}</div>`;
    html += `<div class="turn-narrative">${esc(data.narrative)}</div>`;
    // Mechanics
    if (data.mechanics?.length || data.violations?.length || data.plausibility?.length) {
        html += '<div class="turn-mechanics">';
        for (const p of (data.plausibility || [])) {
            if (p.rating === 'IMPOSSIBLE') html += `<div class="mech-impossible">[plaus] ${esc(p.type)}: IMPOSSIBLE — ${esc(p.reason)}</div>`;
            else if (p.rating === 'CHECK') html += `<div class="mech-plaus">[plaus] ${esc(p.type)}: CHECK(${esc(p.skill || '?')}) — ${esc(p.reason)}</div>`;
        }
        for (const m of (data.mechanics || [])) {
            const cls = m.includes('HIT') ? 'mech-hit' : m.includes('MISS') ? 'mech-miss' : m.includes('Counter') ? 'mech-counter' : 'mech-disp';
            html += `<div class="${cls}">${esc(m)}</div>`;
        }
        for (const v of (data.violations || [])) {
            html += `<div class="mech-violation">REJECTED: ${esc(v)}</div>`;
        }
        html += '</div>';
    }
    html += `<button class="swipe-btn" onclick="swipeNarration(this)">↻ Re-roll narration</button>`;
    div.innerHTML = html;
}

async function swipeNarration(btn) {
    btn.disabled = true;
    btn.textContent = '↻ Rolling...';
    try {
        const res = await fetch('/api/swipe', {method:'POST', headers:{'Content-Type':'application/json'}, body:'{}'});
        const data = await res.json();
        const turn = btn.parentElement;
        const narDiv = turn.querySelector('.turn-narrative');
        if (narDiv) narDiv.textContent = data.narrative;
        btn.textContent = '↻ Re-roll narration';
    } catch(e) { btn.textContent = '↻ Error'; }
    btn.disabled = false;
}

async function refreshState() {
    try {
        const res = await fetch('/api/state');
        const s = await res.json();
        renderCharacter(s.player);
        renderLocation(s.location);
        renderNPCs(s.npcs);
        renderClock(s.clock);
        document.getElementById('hp-display').textContent = `HP: ${s.player.hp}/${s.player.hp_max}`;
        document.getElementById('loc-display').textContent = s.location.name;
    } catch(e) {}
}

function renderCharacter(p) {
    const pct = Math.max(0, (p.hp / p.hp_max) * 100);
    let h = `<div class="stat-row"><span class="stat-label">${esc(p.name)}</span><span class="stat-val">${p.hp}/${p.hp_max}</span></div>`;
    h += `<div class="hp-bar"><div class="hp-fill" style="width:${pct}%"></div></div>`;
    h += `<div class="stat-row"><span class="stat-label">Corporeal</span><span class="stat-val">STR:${p.str} AGI:${p.agi}</span></div>`;
    h += `<div class="stat-row"><span class="stat-label">Ethereal</span><span class="stat-val">INT:${p.int} PRE:${p.pre}</span></div>`;
    h += `<div class="stat-row"><span class="stat-label">Celestial</span><span class="stat-val">WIL:${p.wil} PER:${p.per}</span></div>`;
    for (const [sk, lv] of Object.entries(p.skills || {})) {
        h += `<div class="stat-row"><span class="stat-label">${esc(sk)}</span><span class="stat-val">${lv}</span></div>`;
    }
    if (p.conds?.length) {
        h += '<div style="margin-top:6px">';
        for (const c of p.conds) h += `<span class="cond-badge">${esc(c)}</span>`;
        h += '</div>';
    }
    if (p.notes) h += `<div class="npc-notes" style="margin-top:6px">${esc(p.notes)}</div>`;
    document.getElementById('char-info').innerHTML = h;
    // Inventory
    let inv = '';
    for (const i of (p.inv || [])) {
        const eq = i.equipped ? ' <span class="equipped">[E]</span>' : '';
        const qty = i.quantity > 1 ? ` x${i.quantity}` : '';
        inv += `<div class="inv-item">${esc(i.name)}${qty}${eq}</div>`;
    }
    document.getElementById('char-inv').innerHTML = inv || '<div class="inv-item">Nothing</div>';
    // Knowledge
    let kn = '';
    for (const k of (p.knowledge || [])) kn += `<div class="knowledge-item">${esc(k)}</div>`;
    document.getElementById('char-knowledge').innerHTML = kn || '<div class="knowledge-item">Nothing known</div>';
}

function renderLocation(loc) {
    let h = `<div class="loc-name">${esc(loc.name)}</div>`;
    h += `<div class="loc-desc">${esc(loc.desc)}</div>`;
    if (loc.state) h += `<div class="loc-state">${esc(loc.state)}</div>`;
    h += '<div class="loc-exits">';
    for (const ex of (loc.exits || [])) {
        h += `<span class="loc-exit" onclick="quickMove('${esc(ex)}')">${esc(ex)}</span>`;
    }
    h += '</div>';
    document.getElementById('loc-info').innerHTML = h;
}

function renderNPCs(npcs) {
    let h = '';
    for (const n of npcs) {
        const dead = !n.alive ? ' npc-dead' : '';
        const moodCls = 'mood-' + n.mood;
        const hpPct = n.hp_max > 0 ? Math.max(0, (n.hp / n.hp_max) * 100) : 0;
        h += `<div class="npc-card${dead}">`;
        h += `<span class="npc-name">${esc(n.name)}</span>`;
        h += `<span class="npc-mood ${moodCls}">${esc(n.mood)}</span>`;
        h += ` <span style="font-size:11px;color:#888">${n.hp}/${n.hp_max}</span>`;
        h += `<div class="npc-hp-bar"><div class="npc-hp-fill" style="width:${hpPct}%"></div></div>`;
        if (n.notes) h += `<div class="npc-notes">${esc(n.notes)}</div>`;
        for (const g of (n.goals || [])) h += `<div class="npc-goal">${esc(g)}</div>`;
        for (const k of (n.knows || [])) h += `<div class="npc-knows">${esc(k)}</div>`;
        h += '</div>';
    }
    document.getElementById('npc-list').innerHTML = h || '<div class="npc-notes">No one here</div>';
}

function renderClock(c) {
    if (c && c.current_time) {
        document.getElementById('clock-display').textContent = `${c.current_time} | ${c.season || ''} | ${c.weather || ''}`;
    }
}

function quickMove(exit) {
    inp.value = exit;
    sendAction();
}

function esc(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Initial load
refreshState();
</script>
</body>
</html>
